<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <h1>Calculadora</h1>
    <div id="calculator">
        <!-- POST envia os dados para o Flask; a função calcular() no Python faz a conta -->
        <form method="POST" action="{{ url_for('index') }}">
            <div class="form-grupo">
                <label for="num1">Primeiro número</label>
                <input type="number" id="num1" name="num1" step="any" required
                       value="{{ request.form.get('num1', '') }}">
            </div>


            <div class="form-grupo">
                <label for="operacao">Operação</label>
                {% set op = request.form.get('operacao', '+') %}
                <select id="operacao" name="operacao" required onchange="atualizarNum2()">
                    <option value="+" {% if op == '+' %}selected{% endif %}>+ Somar</option>
                    <option value="-" {% if op == '-' %}selected{% endif %}>− Subtrair</option>
                    <option value="*" {% if op == '*' %}selected{% endif %}>× Multiplicar</option>
                    <option value="/" {% if op == '/' %}selected{% endif %}>÷ Dividir</option>
                    <option value="**" {% if op == '**' %}selected{% endif %}>^ Potência</option>
                    <option value="sqrt" {% if op == 'sqrt' %}selected{% endif %}>√ Raiz quadrada</option>
                    <option value="bhaskara" {% if op == 'bhaskara' %}selected{% endif %}> Δ Bhaskara</option>
                    <option value="log" {% if op == 'log' %}selected{% endif %}> Logaritmo</option>
                </select>
            </div>

            <div class="form-grupo" id="grupo-num2">
                <label for="num2">Segundo número</label>
                <input type="number" id="num2" name="num2" step="any"
                       value="{{ request.form.get('num2', '') }}">
            </div>

            <div class="form-grupo" id="grupo-b">
                <label for="b">Valor de b</label>
                <input type="number" id="b" name="b" step="any">
            </div>
            
            <div class="form-grupo" id="grupo-c">
                <label for="c">Valor de c</label>
                <input type="number" id="c" name="c" step="any">
            </div>

            <button type="submit">Calcular</button>
        </form>


        {% if etapas %}
        <div class="resultado">
            <strong>Resposta do servidor:</strong>
            <div class="rrrrr">Resultado: {{ resultados }}</div>
            <div class="rrrrr">{{ etapas }}</div>
           
        </div>
        {% endif %}


        <a href="{{ url_for('index') }}" class="link">Limpar / nova conta</a>
    </div>


    <script>
        function atualizarNum2() {
    
            const op = document.getElementById("operacao").value;
            const grupoNum2 = document.getElementById("grupo-num2");
            const num2 = document.getElementById("num2");
            const grupoB = document.getElementById("grupo-b");
            const grupoC = document.getElementById("grupo-c");
    
            grupoNum2.style.display = "block";
            grupoB.style.display = "none";
            grupoC.style.display = "none";
    
            num2.required = true;
    
            if (op === "sqrt") {
                grupoNum2.style.display = "none";
                num2.required = false;
                num2.value = "";
            }
    
            if (op === "bhaskara") {
                grupoNum2.style.display = "none";
                grupoB.style.display = "block";
                grupoC.style.display = "block";
    
                num2.required = false;
                num2.value = "";
            }

          
        }
    
        atualizarNum2();
    </script>


</body>
</html>
